<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คสต็อกก๋วยเตี๋ยวเรือ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body { box-sizing: border-box; }
    * { font-family: 'Sarabun', sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .lang-btn{
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;
      font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;border:2px solid transparent;
    }
    .lang-btn.active{ background-color:#ea580c;color:white;border-color:#ea580c; }
    .lang-btn:not(.active){ background-color:white;color:#ea580c;border-color:#f3f4f6; }
    .lang-selector{ display:flex;gap:4px;padding:6px;background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .trend-up{ color:#ef4444; } .trend-down{ color:#22c55e; } .trend-neutral{ color:#6b7280; }
    .qty-invalid{ border-color:#ef4444 !important; background: #fff1f2; }
  </style>
  <style>@view-transition { navigation: auto; }</style>
</head>

<body class="h-full bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50">
  <div id="app" class="h-full w-full overflow-auto">
    <!-- Language Selector -->
    <div class="fixed top-4 right-4 z-50 lang-selector">
      <button onclick="setLanguage('th')" class="lang-btn active" id="btn-th" title="ไทย">ไทย</button>
      <button onclick="setLanguage('lo')" class="lang-btn" id="btn-lo" title="ລາວ">ລາວ</button>
      <button onclick="setLanguage('my')" class="lang-btn" id="btn-my" title="မြန်မာ">မြန်</button>
    </div>

    <!-- หน้าหลัก -->
    <div id="home-page" class="min-h-full p-4 md:p-6 pt-20">
      <div class="max-w-lg mx-auto">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 id="shop-title" class="text-2xl md:text-3xl font-bold text-orange-800">🍜 ก๋วยเตี๋ยวเรือรสจนา</h1>
            <p id="txt-daily-check" class="text-orange-600 text-sm mt-1">เช็คสต็อกประจำวัน</p>
          </div>
          <button onclick="showHistory()" class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-md hover:shadow-lg transition-all text-orange-700 font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="txt-history">ประวัติ</span>
          </button>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-md mb-6">
          <p id="txt-date2" class="text-gray-500 text-sm">วันที่</p>
          <p id="current-date" class="text-lg font-semibold text-gray-800"></p>
        </div>

        <div class="space-y-4">
          <button onclick="selectCategory('หน้าเรือ')" class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🚣</div>
              <div class="text-left">
                <p id="cat-boat" class="text-xl font-bold">หน้าเรือ</p>
                <p id="cat-boat-desc" class="text-orange-100 text-sm">เช็คสต็อกวัตถุดิบหน้าเรือ</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('อาหารตามสั่ง')" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🍳</div>
              <div class="text-left">
                <p id="cat-food" class="text-xl font-bold">อาหารตามสั่ง</p>
                <p id="cat-food-desc" class="text-emerald-100 text-sm">เช็คสต็อกวัตถุดิบอาหารตามสั่ง</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>

          <button onclick="selectCategory('เด็กเสิร์ฟ')" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white p-5 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:scale-[1.02] active:scale-[0.98]">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-3xl">🧑‍🍳</div>
              <div class="text-left">
                <p id="cat-staff" class="text-xl font-bold">เด็กเสิร์ฟ</p>
                <p id="cat-staff-desc" class="text-blue-100 text-sm">เช็คสต็อกอุปกรณ์เด็กเสิร์ฟ</p>
              </div>
              <svg class="w-6 h-6 ml-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- หน้ากรอกชื่อ -->
    <div id="name-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-lg mx-auto fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-home">กลับหน้าหลัก</span>
        </button>

        <div class="bg-white rounded-2xl p-6 shadow-lg">
          <div id="category-badge" class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-white text-sm font-medium mb-4"></div>
          <h2 id="txt-staff-name-title" class="text-xl font-bold text-gray-800 mb-2">ผู้เช็คสต็อก</h2>
          <p id="txt-staff-name-desc" class="text-gray-500 mb-6">กรุณากรอกชื่อผู้ทำการเช็คสต็อก</p>
          <div class="space-y-4">
            <div>
              <label id="txt-full-name-label" class="block text-sm font-medium text-gray-700 mb-2">ชื่อ-นามสกุล</label>
              <input type="text" id="checker-name" placeholder="กรอกชื่อของคุณ" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors text-lg">
            </div>
            <button onclick="startChecking()" id="btn-start-checking" class="w-full bg-orange-500 text-white py-4 rounded-xl font-semibold text-lg hover:bg-orange-600 transition-colors shadow-md hover:shadow-lg">เริ่มเช็คสต็อก</button>
          </div>
        </div>
      </div>
    </div>

    <!-- หน้าเช็คสต็อก -->
    <div id="stock-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <div class="flex items-center justify-between mb-6">
          <button onclick="goToNamePage()" class="flex items-center gap-2 text-orange-700 hover:text-orange-800 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            <span id="txt-back">กลับ</span>
          </button>
          <div id="stock-category-badge" class="px-4 py-2 rounded-full text-white text-sm font-medium"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-orange-500 to-orange-600 p-4 text-white">
            <p class="text-sm opacity-90"><span id="txt-staff-checker">ผู้เช็คสต็อก:</span> <span id="display-checker-name" class="font-semibold"></span></p>
            <p class="text-sm opacity-90"><span id="txt-date-label">วันที่:</span> <span id="display-date" class="font-semibold"></span></p>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th id="txt-item" class="px-4 py-3 text-left text-sm font-semibold text-gray-700">รายการ</th>
                  <th id="txt-quantity" class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-28">จำนวน</th>
                  <th id="txt-unit" class="px-4 py-3 text-center text-sm font-semibold text-gray-700 w-20">หน่วย</th>
                  <th id="txt-note" class="px-4 py-3 text-left text-sm font-semibold text-gray-700">หมายเหตุ</th>
                </tr>
              </thead>
              <tbody id="stock-table-body" class="divide-y divide-gray-100"></tbody>
            </table>
          </div>

          <div class="p-4 bg-gray-50">
            <button id="save-btn" onclick="saveStock()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-4 rounded-xl font-semibold text-lg hover:from-green-600 hover:to-green-700 transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              <span id="txt-save">บันทึกข้อมูล</span>
            </button>
            <p class="text-xs text-gray-500 mt-2">
              * ช่อง “จำนวน” ใส่ได้เฉพาะ 0-9 และสัญลักษณ์ . / + -
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- หน้าประวัติ -->
    <div id="history-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-home2">กลับหน้าหลัก</span>
        </button>

        <h2 id="txt-history-title" class="text-2xl font-bold text-gray-800 mb-4">📋 ประวัติการเช็คสต็อก</h2>

        <div class="bg-white rounded-2xl p-4 shadow-md mb-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label id="txt-select-date" class="block text-sm font-medium text-gray-700 mb-2">เลือกวันที่</label>
              <input type="date" id="filter-date" onchange="filterHistory()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors">
            </div>
            <div>
              <label id="txt-category-label" class="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่</label>
              <select id="filter-category" onchange="filterHistory()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:outline-none transition-colors">
                <option value="" id="opt-all">ทั้งหมด</option>
                <option value="หน้าเรือ">หน้าเรือ</option>
                <option value="อาหารตามสั่ง">อาหารตามสั่ง</option>
                <option value="เด็กเสิร์ฟ">เด็กเสิร์ฟ</option>
              </select>
            </div>
          </div>
        </div>

        <div id="history-list" class="space-y-4"></div>
        <div id="no-history" class="hidden text-center py-12">
          <div class="text-6xl mb-4">📭</div>
          <p id="txt-no-history" class="text-gray-500">ไม่พบประวัติการเช็คสต็อก</p>
        </div>
      </div>
    </div>

    <!-- หน้ารายละเอียดประวัติ -->
    <div id="history-detail-page" class="min-h-full p-4 md:p-6 hidden">
      <div class="max-w-2xl mx-auto fade-in">
        <button onclick="showHistory()" class="flex items-center gap-2 text-orange-700 mb-6 hover:text-orange-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span id="txt-back-history">กลับหน้าประวัติ</span>
        </button>
        <div id="history-detail-content" class="bg-white rounded-2xl shadow-lg overflow-hidden"></div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg hidden transition-all duration-300 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
      <span id="toast-message">บันทึกสำเร็จ!</span>
    </div>
  </div>

    function getUnitGroup_(unitStr){
      const u = (unitStr || "").trim();
      if (u === "กิโลกรัม/กรัม" || u === "กรัม/กิโลกรัม") return "weight_kg";
      if (u === "ขวด/แพ็ค") return "bottle_pack12";
      if (u === "ขวด/ลัง") return "bottle_crate24";
      return null;
    }

    const ITEM_META_BY_NAME = (() => {
      const map = {};
      for (const [cat, items] of Object.entries(stockItems)) {
        for (const it of items) {
          if (!it || !it.name) continue;
          const defUnit = it.unit || "";
          const unitGroup = getUnitGroup_(defUnit);
          map[it.name] = { defaultUnit: defUnit, unitGroup, category: cat };
        }
      }
      return map;
    })();

    const UNIT_OPTIONS_BY_ITEM = {
      "อกไก่": ["กรัม","กิโลกรัม"],
      "ปลาหมึก": ["กรัม","กิโลกรัม"],
      "กุ้ง": ["กรัม","กิโลกรัม"],
      "สปาเก็ตตี้": ["กรัม","กิโลกรัม"],
      "กากเจียว": ["กรัม","กิโลกรัม"]
    };

    function getUnitOptions_(item){
      const byName = UNIT_OPTIONS_BY_ITEM[item.name];
      if (byName && Array.isArray(byName) && byName.length) return byName.slice();
      const u = String((item && item.unit) || "").trim();
      if (u.includes("/")) return u.split("/").map(s=>s.trim()).filter(Boolean);
      if (u === "กรัม" || u === "กิโลกรัม") return ["กรัม","กิโลกรัม"];
      return null;
    }

    function normalizeQtyToBase_(qty, unitSelected, unitOptions) {
      const n = Number(qty);
      if (!isFinite(n)) return { qty: NaN, unit: String(unitSelected || '').trim() };

      const u = String(unitSelected || '').trim();
      const opts = (unitOptions || []).map(x => String(x || '').trim());

      if (opts.includes('กรัม') && opts.includes('กิโลกรัม')) {
        if (u === 'กรัม') return { qty: n / 1000, unit: 'กิโลกรัม' };
        return { qty: n, unit: 'กิโลกรัม' };
      }

      if (opts.includes('ขวด') && opts.includes('ลัง')) {
        if (u === 'ลัง') return { qty: n * 24, unit: 'ขวด' };
        return { qty: n, unit: 'ขวด' };
      }

      if (opts.includes('ขวด') && opts.includes('แพ็ค')) {
        if (u === 'แพ็ค') return { qty: n * 12, unit: 'ขวด' };
        return { qty: n, unit: 'ขวด' };
      }

      return { qty: n, unit: u };
    }

    function getComparableQty_(it) {
      if (it && typeof it.quantity_base === 'number' && isFinite(it.quantity_base)) return it.quantity_base;
      const rawQty = Number(it?.quantity_raw ?? it?.quantity ?? NaN);
      const unitSelected = String(it?.unit_raw ?? it?.unit ?? '').trim();
      const unitGroup = String(it?.unit_group ?? it?.unit ?? '').trim();
      const unitOptions = getUnitOptions_(unitGroup) || (unitSelected ? [unitSelected] : null);
      if (!unitOptions) return rawQty;
      const norm = normalizeQtyToBase_(rawQty, unitSelected, unitOptions);
      return norm.qty;
    }

    function getDisplayUnit_(it){
      const meta = (it && it.name) ? (ITEM_META_BY_NAME[it.name] || null) : null;
      const unitDef = meta ? (meta.defaultUnit || "") : "";
      const unitOptions = getUnitOptions_({ name: it?.name || "", unit: unitDef });
      const unitSelected = (it && it.unit) ? String(it.unit).trim() : "";
      const normalized = normalizeQtyToBase_(1, unitSelected, unitOptions);
      return normalized.unit || unitSelected || unitDef || "";
    }

function fmtQty(v){
  if (v === null || v === undefined) return "";
  if (typeof v === "string" && v.trim() === "") return "";

  const n = Number(v);
  if (!isFinite(n)) return String(v);

  // แสดงทศนิยมสูงสุด 2 ตำแหน่ง
  let s = n.toFixed(2);

  // ตัด .00 หรือ 0 ท้าย
  s = s.replace(/\.00$/, "").replace(/(\.\d)0$/, "$1");

  return s;
}

    function shouldCeilDisplayByUnit_(unit){
      const u = String(unit || "").trim();
      return u !== "กรัม" && u !== "กิโลกรัม";
    }

function applyDisplayRounding_(qty){
  const n = Number(qty);
  if (!isFinite(n)) return qty;

  // ปัดแบบมาตรฐาน + กัน floating point error (เช่น 0.255)
  return Math.round((n + Number.EPSILON) * 100) / 100;
}

function getDisplayQty_(it){
  const qtyRaw = (it && it.quantity !== undefined && it.quantity !== null) ? it.quantity : "";

  const meta = (it && it.name) ? (ITEM_META_BY_NAME[it.name] || null) : null;
  const unitDef = meta ? (meta.defaultUnit || "") : "";

  const unitOptions = getUnitOptions_({ name: it?.name || "", unit: unitDef });
  const unitSelected = (it && it.unit) ? String(it.unit).trim() : "";

  const normalized = normalizeQtyToBase_(qtyRaw, unitSelected, unitOptions);

  return applyDisplayRounding_(normalized.qty);
}

    const QTY_ALLOWED_RE = /[0-9.\-+\/]/;

    function sanitizeQuantityRaw_(raw) {
      let out = "";
      for (const ch of String(raw || "")) {
        if (QTY_ALLOWED_RE.test(ch)) out += ch;
      }
      out = out.replace(/(?!^)[+-]/g, "");
      return out;
    }

    function parseQuantity_(raw) {
      const s = String(raw || "").trim();
      if (!s) return { ok: true, value: 0 };

      if (/^[+-]?\d*(?:\.\d+)?$/.test(s)) {
        const v = Number(s);
        if (Number.isFinite(v)) return { ok: true, value: v };
        return { ok: false, value: 0 };
      }

      const m = s.match(/^([+-]?\d*(?:\.\d+)?)\s*\/\s*(\d*(?:\.\d+)?)$/);
      if (m) {
        const aStr = m[1];
        const bStr = m[2];
        if (!aStr || aStr === "+" || aStr === "-") return { ok: false, value: 0 };
        if (!bStr) return { ok: false, value: 0 };
        const a = Number(aStr);
        const b = Number(bStr);
        if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return { ok: false, value: 0 };
        return { ok: true, value: a / b };
      }

      return { ok: false, value: 0 };
    }

    function sanitizeQuantityInput(el) {
      const before = el.value;
      const after = sanitizeQuantityRaw_(before);
      if (before !== after) el.value = after;

      const p = parseQuantity_(el.value);

      const item = el.getAttribute("data-item");
      setDraftValue_(currentCategory, item, "quantity_raw", el.value);

    function formatFullDate(date, lang) {
      const options = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
      return new Date(date).toLocaleDateString(lang === 'lo' ? 'lo-LA' : lang === 'my' ? 'my-MM' : 'en-US', options);

    function getPreviousRecord(category, currentDate) {
      const curr = currentDate ? new Date(currentDate).getTime() : null;
      const filtered = (allRecords || [])
        .filter(r => r.category === category)
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      if (!filtered.length) return null;
      if (!curr) return filtered.length > 1 ? filtered[1] : null;
      const prev = filtered.find(r => new Date(r.date).getTime() < curr);
      return prev || null;
    }

    async function saveStock() {
      const btn = document.getElementById('save-btn');
      const originalBtnHtml = btn.innerHTML;

      const disableBtn_ = () => {
        btn.disabled = true;
        btn.innerHTML = `
          <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          ${translations[currentLanguage].save}
        `;
      };

      const enableBtn_ = () => {
        btn.disabled = false;
        btn.innerHTML = originalBtnHtml;
      };

      const withTimeout_ = (promise, ms, label) =>
        Promise.race([
          promise,
          new Promise((_, reject) => setTimeout(() => reject(new Error(label || "TIMEOUT")), ms))
        ]);

      disableBtn_();

      try {
        const items = stockItems[currentCategory] || [];
        const missingEls = [];
        const invalidEls = [];

        const stockEntries = items.map(item => {
          if (!item.unit) return { __section: true, name: item.name, unit: item.unit };

          const qtyEl = document.querySelector(`input[data-item="${item.name}"][data-field="quantity_raw"]`);
          const noteEl = document.querySelector(`input[data-item="${item.name}"][data-field="note"]`);

          const raw = qtyEl ? qtyEl.value.trim() : "";
          const parsed = parseQuantity_(raw);

          if (qtyEl && raw === "") missingEls.push(qtyEl);
          else if (qtyEl && !parsed.ok) invalidEls.push(qtyEl);

          const unitSelectEl = Array.from(document.querySelectorAll('select[data-field="unit"]'))
            .find(el => el && el.dataset && el.dataset.item === item.name);
          const unitInput = (unitSelectEl ? unitSelectEl.value : null)
            || getDraftValue_(currentCategory, item.name, "unit")
            || (item.unit || "");
          const qtyNum = parsed.ok ? parsed.value : 0;
          const unitOptions = getUnitOptions_(item) || [String(item.unit || '').trim()];
          const norm = normalizeQtyToBase_(qtyNum, unitInput, unitOptions);

          return {
            name: item.name,
            unit: norm.unit,
            unit_input: unitInput,
            unit_group: String(item.unit || '').trim(),
            unit_options: unitOptions,
            quantity_raw: raw,
            quantity: norm.qty,
            quantity_base: norm.qty,
            note: noteEl ? noteEl.value.trim() : ""
          };
        }).filter(x => !x.__section);

        if (missingEls.length) {
          missingEls.forEach(el => el.classList.add("border-red-500"));
          missingEls[0].scrollIntoView({ behavior: "smooth", block: "center" });
          showToast("กรุณากรอกจำนวนให้ครบทุกช่อง (ใส่ 0 ได้ แต่ห้ามปล่อยว่าง)", "error");
          return;
        }

        if (invalidEls.length) {
          invalidEls.forEach(el => el.classList.add("border-red-500"));
          invalidEls[0].scrollIntoView({ behavior: "smooth", block: "center" });
          showToast("รูปแบบจำนวนไม่ถูกต้อง (อนุญาต 0-9 และ . / + -)", "error");
          return;
        }

        if (allRecords.length >= 999) {
          showToast(translations[currentLanguage].fullLimit, 'error');
          return;
        }

        const nowIso = new Date().toISOString();
        const record = {
          id: Date.now().toString(),
          category: currentCategory,
          checker_name: checkerName,
          date: nowIso,
          items: JSON.stringify(stockEntries),
          created_at: nowIso
        };

        let canvaOk = false;
        try {
          if (window.dataSdk && typeof window.dataSdk.create === "function") {
            const r = await withTimeout_(window.dataSdk.create(record), 15000, "DATA_SDK_TIMEOUT");
            canvaOk = !!(r && r.isOk);
          }
        } catch (e) {
          console.warn("dataSdk.create failed:", e);
        }

        let sheetOk = false;
        try {
          if (typeof GOOGLE_SHEET_WEBAPP_URL === "string" &&
              GOOGLE_SHEET_WEBAPP_URL.startsWith("https://script.google.com/macros/s/")) {
            const payload = {
              __backendId: "web-" + Date.now().toString(),
              ...record
            };
            const resp = await withTimeout_(
              fetch(GOOGLE_SHEET_WEBAPP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
              }),
              15000,
              "SHEET_POST_TIMEOUT"
            );
            sheetOk = !!resp;
          }
        } catch (e) {
          console.warn("sheet POST failed:", e);
        }

        if (canvaOk || sheetOk) {
          clearDraft_(currentCategory);
          showToast(translations[currentLanguage].saved, 'success');
          setTimeout(() => goHome(), 800);
        } else {
          showToast(translations[currentLanguage].error + " (บันทึกไม่สำเร็จ)", 'error');
        }
      } catch (err) {
        console.error(err);
        showToast(translations[currentLanguage].error, 'error');
      } finally {
        enableBtn_();
      }
    }

function loadJSONP(url, callbackName) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const sep = url.includes('?') ? '&' : '?';
    script.src = `${url}${sep}callback=${callbackName}&_=${Date.now()}`;

    window[callbackName] = function (data) {
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    script.onerror = function () {
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('JSONP failed'));
    };

    document.body.appendChild(script);
  });
}

async function fetchHistoryJSONP_() {
  const cb = 'cb_' + Date.now();

  const res = await loadJSONP(
    `${GOOGLE_SHEET_WEBAPP_URL}?action=list`,
    cb
  );

  if (!res || !res.ok) {
    throw new Error((res && res.error) || 'โหลดประวัติไม่สำเร็จ');
  }

  return (res.records || []).map(r => ({
    ...r,
    __backendId: r.backendId || r.__backendId || r.id || '',
    items: r.items || r.items_json || '[]'
  }));
}

function renderHistory() {
  const filterDate = document.getElementById('filter-date').value;
  const filterCategory = document.getElementById('filter-category').value;

  let filtered = [...(allRecords || [])];

  if (filterDate) {
    filtered = filtered.filter(r => {
      const raw = String(r.date || '').trim();

      // รองรับ yyyy-mm-dd
      if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
        return raw.slice(0, 10) === filterDate;
      }

      // รองรับ dd/mm/yyyy
      if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(raw)) {
        const [dd, mm, yyyy] = raw.split('/');
        const normalized = `${yyyy}-${String(mm).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
        return normalized === filterDate;
      }

      const d = new Date(raw);
      if (!isNaN(d.getTime())) {
        const normalized = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
        return normalized === filterDate;
      }

      return false;
    });
  }

  if (filterCategory) filtered = filtered.filter(r => r.category === filterCategory);

  filtered.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

  const listEl = document.getElementById('history-list');
  const noHistory = document.getElementById('no-history');

  if (filtered.length === 0) {
    listEl.innerHTML = '';
    noHistory.classList.remove('hidden');
    return;
  }

  noHistory.classList.add('hidden');

  const colors = { 'หน้าเรือ': 'from-orange-500 to-orange-600', 'อาหารตามสั่ง': 'from-emerald-500 to-emerald-600', 'เด็กเสิร์ฟ': 'from-blue-500 to-blue-600' };
  const icons = { 'หน้าเรือ': '🚣', 'อาหารตามสั่ง': '🍳', 'เด็กเสิร์ฟ': '🧑‍🍳' };

  listEl.innerHTML = filtered.map(record => `
    <div onclick="showHistoryDetail('${record.__backendId || record.id}')" class="bg-white rounded-xl p-4 shadow-md hover:shadow-lg transition-all cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br ${colors[record.category] || 'from-gray-400 to-gray-500'} rounded-xl flex items-center justify-center text-2xl">
          ${icons[record.category] || '📦'}
        </div>
        <div class="flex-1">
          <p class="font-semibold text-gray-800">${tCategory(record.category)}</p>
          <p class="text-sm text-gray-500">${translations[currentLanguage].staffChecker} ${record.checker_name}</p>
          <p class="text-sm text-gray-400">${formatFullDate(record.date, currentLanguage)}</p>
        </div>
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </div>
    </div>
  `).join('');
}

        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">${t.item}</th>
            <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.quantity}</th>
            <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.unit}</th>
            ${previousRecord ? `<th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.compared}<br><span class="text-xs font-normal">${formatDate(previousRecord.date, currentLanguage)}</span></th>
            <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.changeLabel}</th>
            <th class="px-4 py-3 text-center text-sm font-semibold text-gray-700">${t.changePctLabel}</th>` : ''}
            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">${t.note}</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          ${items.map(item => {
            let comparison = '';
            let trend = '';
            if (previousRecord) {
              const prevItem = getItemFromRecord(previousRecord, item.name);
              if (prevItem) {
                const curBase = getComparableQty_(item);
                const prevBase = getComparableQty_(prevItem);
                const diff = curBase - prevBase;

                if (diff > 0) trend = `<span class="trend-up">⬆ +${fmtQty(diff)}</span>`;
                else if (diff < 0) trend = `<span class="trend-down">⬇ ${fmtQty(diff)}</span>`;
                else trend = `<span class="trend-neutral">- ${t.noChange}</span>`;

                let pctHtml = `<span class="text-gray-400">-</span>`;
                if (prevBase > 0) {
                  const pct = (diff / prevBase) * 100;
                  const sign = pct > 0 ? "+" : "";
                  const cls = pct > 0 ? "trend-up" : (pct < 0 ? "trend-down" : "trend-neutral");
                  pctHtml = `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
                } else if (prevBase === 0 && curBase !== 0) {
                  pctHtml = `<span class="text-xs text-blue-600">${t.noPrevious}</span>`;
                }

                comparison = `<td class="px-4 py-3 text-center font-semibold text-gray-600">${fmtQty(getDisplayQty_(prevItem))} ${tUnit(getDisplayUnit_(prevItem))}</td>
                              <td class="px-4 py-3 text-center font-semibold">${trend}</td>
                              <td class="px-4 py-3 text-center font-semibold">${pctHtml}</td>`;
              } else {
                comparison = `<td class="px-4 py-3 text-center text-gray-400">-</td>
                              <td class="px-4 py-3 text-center"><span class="text-xs text-blue-600">${t.noPrevious}</span></td>
                              <td class="px-4 py-3 text-center"><span class="text-gray-400">-</span></td>`;
              }
            }

            const displayQty = getDisplayQty_(item);
            const displayUnit = getDisplayUnit_(item);

            return `
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-3 font-medium text-gray-800">${tItem(item.name)}</td>
                <td class="px-4 py-3 text-center font-semibold ${Number(displayQty || 0) > 0 ? 'text-green-600' : 'text-red-500'}">${fmtQty(displayQty)}</td>
                <td class="px-4 py-3 text-center text-gray-600">${tUnit(displayUnit)}</td>
                ${comparison}
                <td class="px-4 py-3 text-gray-500">${item.note || '-'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  showPage('history-detail-page');
}

init();
